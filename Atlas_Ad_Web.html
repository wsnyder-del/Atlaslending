*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060e1c;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px;font-family:Arial,sans-serif;}

.ad-wrap{
  position:relative;
  width:min(680px,100vw);
  cursor:pointer;
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.ad-base{display:block;width:100%;height:auto;}

/* QR zone — positioned over phone screen */
.qr-zone{
  position:absolute;
  right:4.5%;
  top:49%;
  width:19%;
  cursor:pointer;
  transition:transform 0.2s;
}
.qr-zone:hover{transform:scale(1.04);}
.qr-zone img{width:100%;height:auto;border-radius:10px;display:block;}

/* Invisible clickable overlay over the gold CTA button */
.cta-overlay{
  position:absolute;
  left:2%;
  bottom:13.5%;
  width:54%;
  height:8%;
  cursor:pointer;
  border-radius:30px;
  background:transparent;
  border:none;
  transition:background 0.2s;
}
.cta-overlay:hover{background:rgba(232,201,106,0.12);}

/* Pulse animation on QR */
@keyframes pulse{
  0%{box-shadow:0 0 0 0 rgba(201,168,76,0.5);}
  70%{box-shadow:0 0 0 10px rgba(201,168,76,0);}
  100%{box-shadow:0 0 0 0 rgba(201,168,76,0);}
}
.qr-zone img{animation:pulse 2.5s infinite;border-radius:10px;}

.tagline{
  margin-top:16px;
  font-size:13px;
  color:rgba(255,255,255,0.4);
  letter-spacing:0.06em;
  text-align:center;
}
.tagline a{color:#c9a84c;text-decoration:none;}
